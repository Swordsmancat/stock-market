name: stock-acceptance

x-python-service: &python-service
  build:
    context: .
    dockerfile: Dockerfile.acceptance
  environment: &acceptance-environment
    APP_ENV: acceptance
    DATABASE_URL: postgresql+psycopg://stock:stock@db:5432/stock_acceptance
    REDIS_URL: redis://redis:6379/0
    MARKET_DATA_PROVIDER: akshare
    LLM_PROVIDER: mock
    DAILY_REPORT_WATCHLIST: 600519:CN
    A_SHARE_BACKFILL_REQUEST_DELAY_MS: ${A_SHARE_BACKFILL_REQUEST_DELAY_MS:-250}
    A_SHARE_BACKFILL_MAX_TRANSIENT_ATTEMPTS: ${A_SHARE_BACKFILL_MAX_TRANSIENT_ATTEMPTS:-3}
    A_SHARE_BACKFILL_RETRY_BASE_SECONDS: ${A_SHARE_BACKFILL_RETRY_BASE_SECONDS:-1.0}
  restart: unless-stopped

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_acceptance
    ports:
      - "127.0.0.1:${ACCEPTANCE_POSTGRES_PORT:-55432}:5432"
    volumes:
      - acceptance-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_acceptance"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${ACCEPTANCE_REDIS_PORT:-56379}:6379"
    volumes:
      - acceptance-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  api:
    <<: *python-service
    environment: *acceptance-environment
    ports:
      - "127.0.0.1:${ACCEPTANCE_API_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 5s
      timeout: 4s
      retries: 30

  worker:
    <<: *python-service
    environment: *acceptance-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: celery -A apps.worker.celery_app.celery_app worker --loglevel=info --concurrency=1

  beat:
    <<: *python-service
    environment: *acceptance-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: celery -A apps.worker.celery_app.celery_app beat --loglevel=info

  web:
    build:
      context: .
      dockerfile: Dockerfile.web.acceptance
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${ACCEPTANCE_API_PORT:-18000}
      NODE_ENV: development
    ports:
      - "127.0.0.1:${ACCEPTANCE_WEB_PORT:-13000}:3000"
    depends_on:
      api:
        condition: service_healthy
    command: npm exec next dev -- --hostname 0.0.0.0 --port 3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/en/ai-research').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 8s
      timeout: 6s
      retries: 30

volumes:
  acceptance-pgdata:
  acceptance-redis:
