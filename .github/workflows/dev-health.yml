name: Dev Health

on:
  workflow_dispatch:
  schedule:
    # Runs at 09:30 China Standard Time.
    - cron: "30 1 * * *"

jobs:
  dev-health:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: stock
          POSTGRES_PASSWORD: stock
          POSTGRES_DB: stock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock -d stock"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://stock:stock@localhost:5432/stock
      REDIS_URL: redis://localhost:6379/0
      API_BASE_URL: http://127.0.0.1:8000
      FRONTEND_BASE_URL: http://127.0.0.1:3000
      FRONTEND_HEALTH_PATH: /zh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run migrations
        run: alembic upgrade head

      - name: Create CI log directory
        run: mkdir -p .ci-logs

      - name: Start API
        run: |
          uvicorn apps.api.main:app --host 127.0.0.1 --port 8000 > .ci-logs/api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --output /dev/null http://127.0.0.1:8000/health; then
              echo "API health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 2
          done

          echo "::group::API log"
          if [ -f .ci-logs/api.log ]; then
            cat .ci-logs/api.log
          else
            echo "Missing .ci-logs/api.log"
          fi
          echo "::endgroup::"
          exit 1

      - name: Start web
        run: |
          npm run dev:web > .ci-logs/web.log 2>&1 &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for frontend
        run: |
          for attempt in {1..45}; do
            if curl --fail --silent --output /dev/null http://127.0.0.1:3000/zh; then
              echo "Frontend health check passed on attempt ${attempt}."
              exit 0
            fi
            sleep 2
          done

          echo "::group::Web log"
          if [ -f .ci-logs/web.log ]; then
            cat .ci-logs/web.log
          else
            echo "Missing .ci-logs/web.log"
          fi
          echo "::endgroup::"
          exit 1

      - name: Run dev health check
        run: python scripts/dev_health_check.py

      - name: Run mock provider readiness
        run: python scripts/provider_readiness.py --provider mock --market US

      - name: Run TaskRun health diagnostics
        run: python scripts/task_run_health.py

      - name: Run focused health tests
        run: >-
          python -m pytest
          tests/scripts/test_dev_health_check.py
          tests/scripts/test_provider_readiness.py
          tests/scripts/test_task_run_health.py
          tests/api/test_health.py
          tests/services/test_task_dispatch.py
          -v

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-health-logs
          path: .ci-logs/*.log
          if-no-files-found: ignore
