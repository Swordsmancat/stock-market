services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@db:5432/stock
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: >
      sh -c "python -m pip install -e . &&
      celery -A apps.worker.celery_app.celery_app worker --loglevel=info"

  beat:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@db:5432/stock
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: >
      sh -c "python -m pip install -e . &&
      celery -A apps.worker.celery_app.celery_app beat --loglevel=info"

volumes:
  pgdata:
